<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BloomVe Share</title>
    <style>
      body {
        margin: 0;
        padding: 14px;
        width: 340px;
        font-family: Inter, Arial, sans-serif;
        background: #f9fafb;
        color: #111827;
      }
      .card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 12px;
      }
      h1 {
        margin: 0;
        font-size: 16px;
      }
      p {
        margin: 4px 0 0;
        font-size: 12px;
        color: #6b7280;
      }
      .field {
        margin-top: 10px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        font-weight: 600;
        color: #374151;
      }
      input,
      select,
      button {
        width: 100%;
        box-sizing: border-box;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        padding: 8px 10px;
        font-size: 13px;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #4f46e5;
      }
      button {
        margin-top: 12px;
        border: none;
        background: #4f46e5;
        color: #ffffff;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #4338ca;
      }
      .secondary {
        margin-top: 8px;
        background: #ffffff;
        border: 1px solid #d1d5db;
        color: #111827;
      }
      .url {
        margin-top: 6px;
        padding: 8px;
        background: #f3f4f6;
        border-radius: 8px;
        font-size: 12px;
        word-break: break-word;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>BloomVe Share</h1>
      <p>Capture this tab and post it to a room.</p>

      <div class="field">
        <label for="apiBaseUrl">API base URL</label>
        <input id="apiBaseUrl" placeholder="http://localhost:3000" />
      </div>

      <div class="field">
        <label for="secret">Temporary shared secret</label>
        <input id="secret" type="password" placeholder="bloomve-dev-secret" />
      </div>

      <div class="field">
        <label for="roomSelect">Room</label>
        <select id="roomSelect">
          <option value="">Select a room</option>
        </select>
      </div>

      <div class="field">
        <label for="roomId">Room ID (manual fallback)</label>
        <input id="roomId" placeholder="Paste room ID" />
      </div>

      <div class="field">
        <label for="title">Title (optional)</label>
        <input id="title" placeholder="Senior Frontend Engineer" />
      </div>

      <div class="field">
        <label>Current tab URL</label>
        <div id="currentUrl" class="url">Loading...</div>
      </div>

      <button id="refreshRooms" class="secondary">Refresh rooms</button>
      <button id="shareBtn">Share to BloomVe</button>
      <div id="status"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
