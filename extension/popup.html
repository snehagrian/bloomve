<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BloomVe Share</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="card" id="popupCard">
      <h1>BloomVe Share</h1>
      <p>Capture this tab and share it to your channels and chats.</p>

      <div id="loginRequired" class="field" style="display: none">
        <div class="url">Please log in to Bloomvey first</div>
        <button id="openLoginBtn" class="secondary">Open Bloomvey Login</button>
      </div>

      <div id="mainContent">

      <div class="field">
        <label for="roomSelectionList">Channels &amp; chats</label>
        <div id="roomSelectionList" class="room-selection-list" role="group" aria-label="Channels and chats">
          <div class="room-selection-empty">Loading channels and chats...</div>
        </div>
      </div>

      <div class="field">
        <label for="title">Title (optional)</label>
        <input id="title" placeholder="Senior Frontend Engineer" />
      </div>

      <div class="field">
        <label>Current tab URL</label>
        <div id="currentUrl" class="url">Loading...</div>
      </div>

      <button id="refreshRooms" class="secondary">Refresh channels</button>
      <button id="saveJobBtn" class="secondary">Save Job to Notes</button>
      <button id="addToNotesIconBtn" class="secondary icon-note-btn">✿ Add to Notes</button>
      <button id="saveRecruitersBtn" class="secondary" style="display: none">Save Recruiters</button>

      <div id="recruitersJobField" class="field" style="display: none">
        <label for="recruitersJobSelect">Choose saved job</label>
        <select id="recruitersJobSelect">
          <option value="">Select a saved job</option>
        </select>
        <button id="confirmSaveRecruitersBtn" class="secondary">Save Recruiters to Job</button>
      </div>

      <button id="shareBtn">Share to BloomVe</button>
      </div>
      <div id="status"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
